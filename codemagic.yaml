workflows:
  android-debug:
    name: "JAYNES MAX TV — Debug APK"
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: "Setup local.properties"
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: "Download gradle-wrapper.jar"
        script: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.1/gradle/wrapper/gradle-wrapper.jar"
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: "Build Debug APK"
        script: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Porg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

    artifacts:
      - app/build/outputs/apk/debug/**.apk

    publishing:
      email:
        recipients:
          - jumannendange@gmail.com
        notify:
          success: true
          failure: true
