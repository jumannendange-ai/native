workflows:
  android-debug:
    name: JAYNES MAX TV — Debug APK
    max_build_duration: 30
    environment:
      android_signing:
        - jaynes_keystore
      vars:
        PACKAGE_NAME: "com.jaynes.maxtv"
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build Debug APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/**.apk
    publishing:
      email:
        recipients:
          - jumannendange@gmail.com
        notify:
          success: true
          failure: true
