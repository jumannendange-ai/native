workflows:
  android-debug:
    name: JAYNES MAX TV — Debug APK
    max_build_duration: 60
    environment:
      java: 17
      vars:
        PACKAGE_NAME: "com.jaynes.maxtv"
    scripts:
      - name: Set local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Install Gradle wrapper
        script: |
          cd $CM_BUILD_DIR
          gradle wrapper --gradle-version=8.4

      - name: Build Debug APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/**.apk

    publishing:
      email:
        recipients:
          - jumannendange@gmail.com
        notify:
          success: true
          failure: true
