workflows:
  android-debug:
    name: "JAYNES MAX TV — Debug APK"
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      java: 17

    scripts:
      - name: "Debug — angalia directory"
        script: |
          echo "PWD: $PWD"
          echo "CM_BUILD_DIR: $CM_BUILD_DIR"
          ls -la
          ls -la $CM_BUILD_DIR

      - name: "Build Debug APK"
        script: |
          cd $CM_BUILD_DIR
          ls -la
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/**.apk

    publishing:
      email:
        recipients:
          - jumannendange@gmail.com
        notify:
          success: true
          failure: true
